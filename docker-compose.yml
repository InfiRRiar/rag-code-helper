services:
  ollama:
      image: ollama/ollama
      container_name: ollama-server
      ports:
        - "11434:11434"
      volumes:
        - ollama:/root/.ollama
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      restart: unless-stopped
  embs:
    container_name: embs
    ports:
      - "8080:8080"
    build:
      context: .
      dockerfile: src/embs/Dockerfile
    environment:
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface/transformers
      HF_HUB_CACHE: /cache/huggingface/hub
    volumes:
      - hf_cache:/cache/huggingface

volumes:
  hf_cache:
  ollama: